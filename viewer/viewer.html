<!DOCTYPE html>
<html>

<head>
    <title>Screen Recording Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fff;
            font-family: 'Inter', sans-serif;

            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            margin: 0;
            background-color: #f0f0f0;
        }

        nav {
            width: 100%;
            height: 68px;
            border-bottom: 1px solid #CFD9D4;
            display: flex;
            align-items: center;
            justify-content: start;
            padding: 0 40px;

        }

        p {
            font-weight: 400;
            font-size: 16px;
            line-height: 24px;
            letter-spacing: 0%;
            text-align: center;

            color: #191F1F;

        }

        .main-container {
            width: 100vw;
            margin-top: 2rem;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 28px;
            padding: 0 40px;
            height: calc(100vh - 68px - 2rem);
        }

        video {
            width: 60vw;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .main-right {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 24px;
            padding: 32px;
            overflow-y: auto;
        }

        .right-content {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            flex-shrink: 0;
        }

        .success-img {
            margin-bottom: 2rem;
        }

        .start-gen-container {
            display: flex;
            align-items: center;
            flex-direction: column;
            gap: 24px;
        }

        .start-gen-container>button {
            width: 100%;
            background-color: #12B97B;
            height: 40px;
            border-radius: 6px;
            color: #FFFFFF;
            border: none;
            font-weight: 600;
            font-size: 16px;
            line-height: 24px;
            letter-spacing: 0%;
            cursor: pointer;
        }

        .or {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .or div {
            height: 1px;
            width: 100%;
            background-color: #D9E7E0;
        }

        .or p {
            font-weight: 400;
            font-size: 14px;
            color: #5A706A;
            margin: 2rem 0;
        }

        .re-record-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .re-record-btns-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .re-record-btns-container button {
            color: #12B97B;
            background-color: transparent;
            height: 40px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;

            font-weight: 400;
            font-size: 16px;
            line-height: 24px;
            letter-spacing: 0%;
            border: none;
            cursor: pointer;
        }

        .re-record-btns-container button:first-child {
            border: 1px solid #12B97B;
            font-weight: 600;
            border-radius: 6px;
        }
        
        .re-record-btns-container button:last-child:hover {
            text-decoration: underline;
        }

        /* Event Timeline Styles */
        .events-panel {
            width: 100%;
            max-width: 400px;
            border: 1px solid #CFD9D4;
            border-radius: 8px;
            background: white;
            margin-top: 20px;
        }

        .events-header {
            padding: 12px;
            border-bottom: 1px solid #CFD9D4;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f8f8;
            border-radius: 8px 8px 0 0;
        }

        .event-item {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .event-item:hover {
            background: #f5f5f5;
        }

        .event-time {
            color: #12B97B;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .event-label {
            color: #333;
            word-break: break-word;
        }

        .event-type {
            color: #999;
            font-size: 11px;
            margin-top: 2px;
        }

        .event-meta {
            color: #999;
            font-size: 11px;
            margin-top: 2px;
            font-family: monospace;
            word-break: break-all;
        }

        .download-btn {
            background-color: #12B97B;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .download-btn:hover {
            background-color: #0ea561;
        }

        .events-count {
            font-size: 12px;
            color: #666;
        }

    </style>
</head>

<body>
    <nav>
        <a href="https://botgauge.com/" target="_blank">
            <img src="../assets/botgauge.svg" alt="Botgauge-logo">
        </a>
    </nav>
    <div class="main-container">
        <video id="recordingPlayer" controls autoplay></video>
        <div class="main-right">
            <div class="right-content">
                <img class="success-img" src="../assets/success-recording.svg" alt="recorded-successfully">
                <div class="start-gen-container">
                    <p>If the video contains all the information for the test cases then start test case generation</p>
                    <button>Start generation process</button>
                </div>
                <div class="or">
                    <div></div>
                    <p>or</p>
                    <div></div>
                </div>
                <div class="re-record-container">
                    <p>If the video is incomplete or is missing key information?</p>
                    <div class="re-record-btns-container">
                        <button id="reRecordButton">Re-record Video</button>
                        <button id="exitButton">Exit</button>
                    </div>
                </div>
            </div>

            <!-- Events Timeline Panel -->
            <div class="events-panel" id="eventsPanel" style="display: none;">
                <div class="events-header">
                    <span>Captured Events</span>
                    <span class="events-count" id="eventsCount">0</span>
                </div>
                <div id="eventsList"></div>
                <button class="download-btn" id="downloadBtn" style="width: calc(100% - 24px); margin-left: 12px; margin-right: 12px; margin-bottom: 12px;">
                 Download Events JSON
                </button>
            </div>
        </div>
    </div>

    <script src="viewer.js"></script>
</body>

</html>
